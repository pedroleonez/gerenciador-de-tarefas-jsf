<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Gerenciador de Tarefas - JSF</title>
    <style>
        .concluida { color: #888; text-decoration: line-through; }
        .prioridade-alta { font-weight: bold; color: #d9534f; }
    </style>
</h:head>

<h:body>
    <p:growl id="messages" showDetail="true" />

    <h1>Gerenciador de Tarefas</h1>

    <h:form id="formCadastro">
        <p:panel header="Nova Tarefa" style="margin-bottom: 20px">
            <h:panelGrid columns="2" cellpadding="5">
                <p:outputLabel for="titulo" value="Título:" />
                <p:inputText id="titulo" value="#{tarefaBean.tarefa.titulo}" required="true" />

                <p:outputLabel for="responsavel" value="Responsável:" />
                <p:inputText id="responsavel" value="#{tarefaBean.tarefa.responsavel}" />

                <p:outputLabel for="prioridade" value="Prioridade:" />
                <p:selectOneMenu id="prioridade" value="#{tarefaBean.tarefa.prioridade}">
                    <f:selectItems value="#{tarefaBean.prioridades}" />
                </p:selectOneMenu>

                <p:outputLabel for="deadline" value="Deadline:" />
                <p:datePicker id="deadline" value="#{tarefaBean.tarefa.deadline}" showIcon="true" />

                <p:commandButton value="Cadastrar Tarefa"
                                 action="#{tarefaBean.salvar}"
                                 update="@form :formListagem:tabelaTarefas :messages"
                                 icon="pi pi-plus" />
            </h:panelGrid>
        </p:panel>
    </h:form>

    <hr/>

    <h:form id="formListagem">
        <p:dataTable id="tabelaTarefas" value="#{tarefaBean.tarefas}" var="t"
                     emptyMessage="Nenhuma tarefa cadastrada."
                     paginator="true" rows="10"
                     filteredValue="#{tarefaBean.tarefasFiltradas}"
                     widgetVar="tarefasTable">

            <p:column headerText="ID" width="50">
                <h:outputText value="#{t.id}" />
            </p:column>

            <p:column headerText="Título" filterBy="#{t.titulo}" filterMatchMode="contains">
                <h:outputText value="#{t.titulo}" styleClass="#{t.concluida ? 'concluida' : ''}" />
            </p:column>

            <p:column headerText="Responsável" filterBy="#{t.responsavel}">
                <h:outputText value="#{t.responsavel}" />
            </p:column>

            <p:column headerText="Prioridade" width="120">
                <h:outputText value="#{t.prioridade}" styleClass="#{t.prioridade == 'ALTA' ? 'prioridade-alta' : ''}" />
            </p:column>

            <p:column headerText="Deadline" width="120">
                <h:outputText value="#{t.deadline}">
                    <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
                </h:outputText>
            </p:column>

            <p:column headerText="Situação" width="100">
                <h:outputText value="#{t.concluida ? 'Concluída' : 'Em andamento'}" />
            </p:column>

            <p:column headerText="Ações" width="150">
                <p:commandButton icon="pi pi-pencil" action="#{tarefaBean.prepararEdicao(t)}"
                                 update=":formCadastro" title="Editar" styleClass="ui-button-info mr-2" />

                <p:commandButton icon="pi pi-check" action="#{tarefaBean.concluir(t)}"
                                 update="formListagem :messages" rendered="#{!t.concluida}"
                                 title="Concluir" styleClass="ui-button-success mr-2" />

                <p:commandButton icon="pi pi-trash" action="#{tarefaBean.remover(t)}"
                                 update="formListagem :messages" title="Excluir" styleClass="ui-button-danger">
                    <p:confirm header="Confirmação" message="Excluir esta tarefa?" icon="pi pi-exclamation-triangle" />
                </p:commandButton>
            </p:column>
        </p:dataTable>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
        </p:confirmDialog>
    </h:form>

</h:body>
</html>
